name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'YouTube Music Mini Player/package-lock.json'

      - name: Install Dependencies
        working-directory: './YouTube Music Mini Player'
        run: |
          npm ci

      - name: Build Windows App
        working-directory: './YouTube Music Mini Player'
        run: |
          npm run build -- --win

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-music-mini-player-win
          path: |
            YouTube Music Mini Player/dist/*.exe
            YouTube Music Mini Player/dist/*.blockmap
